# WireGuard VPN Server Configuration
# Place this file at: /etc/wireguard/wg0.conf on the SERVER machine
#
# BEFORE RUNNING:
# 1. Replace YOUR CONTROL PRIVATE KEY HERE with the server's private key
# 2. Replace PUT YOUR PEER DEVICE KEY HERE with the peer's public key
#
# Generate keys with:
#   wg genkey | tee private.key | wg pubkey > public.key

[Interface]
# The server's private key (keep this secret, never share it)
PrivateKey = YOUR CONTROL PRIVATE KEY HERE

# Port WireGuard listens on — must be open in your firewall (UDP)
ListenPort = 51820

# The server's IP address inside the VPN tunnel
Address = 10.8.0.1/24

# Firewall rule: allow traffic from VPN subnet through Windows firewall
PostUp = netsh advfirewall firewall add rule name="WireGuard NAT" dir=in action=allow enable=yes interfacetype=any protocol=any remoteip=10.8.0.0/24

# If running on Linux instead of Windows, use these PostUp/PostDown rules:
# PostUp = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
# PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

[Peer]
# The peer/client's public key
PublicKey = PUT YOUR PEER DEVICE KEY HERE

# Only allow traffic from this specific peer IP inside the tunnel
AllowedIPs = 10.8.0.3/32
