# WireGuard VPN Peer (Client) Configuration
# Place this file at: /etc/wireguard/wg0.conf on the PEER/CLIENT machine
#
# BEFORE RUNNING:
# 1. Replace YOUR PEER PRIVATE KEY HERE with this machine's private key
# 2. Replace YOUR CONTROL PUBLIC KEY with the server's public key
# 3. Replace YOUR IP SERVERDEVICE with the server's public IP address
#
# Generate keys with:
#   wg genkey | tee private.key | wg pubkey > public.key

[Interface]
# This peer's private key (keep this secret, never share it)
PrivateKey = YOUR PEER PRIVATE KEY HERE

# This peer's IP address inside the VPN tunnel
Address = 10.8.0.3/24

# DNS server to use while connected through the VPN
DNS = 8.8.8.8

# The VPN server this peer connects to
[Peer]
# The server's public key
PublicKey = YOUR CONTROL PUBLIC KEY

# Route ALL traffic through the VPN (full-tunnel mode)
# Change to 10.8.0.0/24 if you only want VPN traffic routed through the tunnel
AllowedIPs = 0.0.0.0/0

# Server's public IP and WireGuard port
Endpoint = YOUR IP SERVERDEVICE:51820

# Send a keepalive packet every 25 seconds to maintain the connection
# through NAT/firewalls
PersistentKeepalive = 25
